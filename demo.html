<html lang="en">
<head>
<meta charset="UTF-8">
<title>cntrlPNL · demo</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0e0e10;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,monospace}
  #canvas-wrap{position:relative;width:320px;height:320px}
  canvas{display:block;border-radius:4px}
  #hud{position:absolute;bottom:8px;left:8px;font-size:9px;color:rgba(255,255,255,.35);line-height:1.7;pointer-events:none}
</style>
</head>
<body>
<div id="canvas-wrap">
  <canvas id="c" width="320" height="320"></canvas>
  <div id="hud"></div>
</div>

<script>
window._glowOpacity = 1.0;
window.pnlConfigs = [{

  ui: {
    title: 'Scene',
    accent: '#7c6ef7',
    collapsed: false,
  },

  controls: [
    { type:'tabs', tabs:[

      { label:'Shape', children:[
        { type:'text',   label:'Background' },
        { type:'color',  key:'bgColor',    label:'bg color',  default:'#0e0e10', modes:['number','slider'] },
        { type:'text',   label:'Shape' },
        { type:'select', key:'shape',      label:'type',      default:'circle',  options:{ circle:'Circle', rect:'Rectangle', triangle:'Triangle', star:'Star' } },
        { type:'color',  key:'shapeColor', label:'fill',      default:'#7c6ef7', modes:['number','box','slider'] },
        { type:'slider', key:'opacity',    label:'opacity',   default:0.9,       min:0, max:1, step:0.01 },
        { type:'slider', key:'size',       label:'size',      default:80,        min:10, max:150, step:1 },
      ]},

      { label:'Motion', children:[
        { type:'point2d', key:'pos',   label:'position', default:{ x:0, y:0 }, xRange:[-1,1], yRange:[-1,1] },
        { type:'toggle',  key:'spin',  label:'spin',     default:true },
        { type:'slider',  key:'speed', label:'speed',    default:1.2, min:0, max:5, step:0.1 },
      ]},

      { label:'FX', children:[
        { type:'toggle',    key:'glow',      label:'glow',    default:true },
        { type:'color',     key:'glowColor', label:'color',   default:'#7c6ef7', modes:['number','slider','opacity'], onOpacity: v => { window._glowOpacity = v; } },
        { type:'slider',    key:'glowSize',  label:'radius',  default:28, min:0, max:80, step:1 },
        { type:'inputtext', key:'label',     label:'text',    default:'cntrlPNL', placeholder:'type something...' },
      ]},

    ]},

    { type:'folder', label:'Advanced', children:[
      { type:'color',   key:'bgColor', label:'bg (alt)', modes:['number','rgb'] },
      { type:'stepper', key:'size',    label:'size ±5',  min:10, max:150, step:5 },
    ]},

    { type:'button', label:'Randomize', onClick: s => {
        const rnd = () => '#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0');
        s.shapeColor = rnd(); s.glowColor = rnd();
        s.size  = 30 + Math.floor(Math.random()*100);
        s.speed = parseFloat((Math.random()*4).toFixed(1));
        s.pos   = { x: parseFloat((Math.random()*1.4-.7).toFixed(2)), y: parseFloat((Math.random()*1.4-.7).toFixed(2)) };
    }},
    { type:'button', label:'Reset', onClick: s => {
        s.bgColor='#0e0e10'; s.shapeColor='#7c6ef7'; s.glowColor='#7c6ef7';
        s.opacity=0.9; s.size=80; s.speed=1.2; s.glow=true; s.spin=true;
        s.pos={x:0,y:0}; s.label='cntrlPNL';
    }},
  ]

}];
</script>
<script src="cntrlPNL.js"></script>

<script>
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
const W = cvs.width, H = cvs.height;
let angle = 0;

function drawStar(ctx, r) {
    const pts=5, step=Math.PI/pts;
    ctx.beginPath();
    for(let i=0;i<pts*2;i++){
        const a=i*step-Math.PI/2, rad=i%2===0?r:r*0.42;
        i===0?ctx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad):ctx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
    }
    ctx.closePath();
}

function hexToRgba(hex, a) {
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
}

function frame() {
    const s = window.pnlStates?.[0];
    if (!s) { requestAnimationFrame(frame); return; }

    if (s.spin) angle += s.speed * 0.012;

    ctx.fillStyle = s.bgColor;
    ctx.fillRect(0, 0, W, H);

    const cx = W/2 + s.pos.x * (W/2 - s.size - 10);
    const cy = H/2 - s.pos.y * (H/2 - s.size - 10);

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.shadowColor = s.glow ? hexToRgba(s.glowColor, window._glowOpacity * 0.6) : 'transparent';
    ctx.shadowBlur  = s.glow ? s.glowSize : 0;
    ctx.globalAlpha = s.opacity;
    ctx.fillStyle   = s.shapeColor;

    switch(s.shape) {
        case 'circle':   ctx.beginPath(); ctx.arc(0,0,s.size,0,Math.PI*2); ctx.fill(); break;
        case 'rect':     ctx.fillRect(-s.size,-s.size,s.size*2,s.size*2); break;
        case 'triangle': ctx.beginPath(); ctx.moveTo(0,-s.size); ctx.lineTo(s.size*.866,s.size*.5); ctx.lineTo(-s.size*.866,s.size*.5); ctx.closePath(); ctx.fill(); break;
        case 'star':     drawStar(ctx, s.size); ctx.fill(); break;
    }

    ctx.restore();
    ctx.shadowBlur=0; ctx.globalAlpha=1;

    if (s.label) {
        ctx.fillStyle='rgba(255,255,255,0.45)';
        ctx.font='11px ui-monospace,monospace';
        ctx.textAlign='center';
        ctx.fillText(s.label, W/2, H-14);
    }

    document.getElementById('hud').innerHTML =
        `shape: ${s.shape}<br>size: ${s.size}  opacity: ${s.opacity.toFixed(2)}<br>`+
        `pos: ${s.pos.x.toFixed(2)}, ${s.pos.y.toFixed(2)}<br>speed: ${s.speed.toFixed(1)}  spin: ${s.spin}`;

    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
